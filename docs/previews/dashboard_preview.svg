  <g transform="translate(815, 330)">
    <rect width="325" height="420" rx="24" fill="#0f172a" fill-opacity="0.4" stroke="white" stroke-opacity="0.05"/>
    <text x="30" y="45" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold">Allocation Mix</text>
    <circle cx="162" cy="180" r="70" stroke="#1e293b" stroke-width="25" fill="none"/>
    <circle cx="162" cy="180" r="70" stroke="#0ea5e9" stroke-width="25" fill="none" stroke-dasharray="250 190" stroke-dashoffset="60"/>
    <circle cx="162" cy="180" r="70" stroke="#6366f1" stroke-width="25" fill="none" stroke-dasharray="100 340" stroke-dashoffset="310"/>
    
    <g transform="translate(30, 280)">
