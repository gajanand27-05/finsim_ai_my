      <text x="15" y="4" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="bold">SHOPPING</text>
      <text x="220" y="4" fill="#f8fafc" font-family="sans-serif" font-size="12" font-weight="bold">₹18,400</text>
      
      <circle cx="0" cy="30" r="5" fill="#6366f1"/>
      <text x="15" y="34" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="bold">FOOD</text>
      <text x="220" y="34" fill="#f8fafc" font-family="sans-serif" font-size="12" font-weight="bold">₹12,200</text>
    </g>
