<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#020617"/>
  <circle cx="600" cy="0" r="400" fill="#a855f7" fill-opacity="0.05"/>
  
  <text x="600" y="100" fill="#f8fafc" font-family="sans-serif" font-size="48" font-weight="900" text-anchor="middle">Financial DNA</text>
  <text x="600" y="140" fill="#64748b" font-family="sans-serif" font-size="18" font-weight="600" text-anchor="middle">Deep behavioral analysis and predictive optimization</text>

  <!-- Profile Cards -->
  <g transform="translate(60, 200)">
    <rect width="520" height="280" rx="30" fill="#0f172a" stroke="white" stroke-opacity="0.05"/>
    <rect x="30" y="30" width="50" height="50" rx="12" fill="#a855f7" fill-opacity="0.1"/>
    <text x="30" y="110" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="900">SPENDING PERSONA</text>
    <text x="30" y="155" fill="#f8fafc" font-family="sans-serif" font-size="36" font-weight="900">Weekend Warrior</text>
    <text x="30" y="200" fill="#94a3b8" font-family="sans-serif" font-size="16" font-weight="500">72% of your discretionary spending occurs</text>
    <text x="30" y="225" fill="#94a3b8" font-family="sans-serif" font-size="16" font-weight="500">between Friday 6PM and Sunday 11PM.</text>
  </g>

  <g transform="translate(620, 200)">
    <rect width="520" height="280" rx="30" fill="#0f172a" stroke="#10b981" stroke-opacity="0.2"/>
    <rect x="30" y="30" width="50" height="50" rx="12" fill="#10b981" fill-opacity="0.1"/>
    <text x="30" y="110" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="900">RISK ASSESSMENT</text>
    <text x="30" y="155" fill="#10b981" font-family="sans-serif" font-size="36" font-weight="900">STABLE</text>
    <text x="30" y="200" fill="#94a3b8" font-family="sans-serif" font-size="16" font-weight="500">Your spending habits are currently within</text>
    <text x="30" y="225" fill="#94a3b8" font-family="sans-serif" font-size="16" font-weight="500">safe parameters for your income bracket.</text>
  </g>

  <!-- Spectrum -->
  <g transform="translate(60, 520)">
    <rect width="1080" height="220" rx="30" fill="#0f172a" fill-opacity="0.4" stroke="white" stroke-opacity="0.05"/>
    <text x="30" y="45" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold">Behavioral Spectrum</text>
    
    <g transform="translate(30, 80)">
      <text x="0" y="0" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="900">IMPULSE VS PLANNED</text>
      <rect y="15" width="1020" height="8" rx="4" fill="#1e293b"/>
      <rect x="700" y="15" width="100" height="8" rx="4" fill="#0ea5e9"/>
      <text x="0" y="45" fill="#475569" font-family="sans-serif" font-size="10" font-weight="bold">PLANNED</text>
      <text x="960" y="45" fill="#475569" font-family="sans-serif" font-size="10" font-weight="bold">IMPULSIVE</text>
    </g>

    <g transform="translate(30, 150)">
      <text x="0" y="0" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="900">NEEDS VS WANTS</text>
      <rect y="15" width="1020" height="8" rx="4" fill="#1e293b"/>
      <rect x="400" y="15" width="100" height="8" rx="4" fill="#a855f7"/>
      <text x="0" y="45" fill="#475569" font-family="sans-serif" font-size="10" font-weight="bold">NEEDS</text>
      <text x="960" y="45" fill="#475569" font-family="sans-serif" font-size="10" font-weight="bold">WANTS</text>
    </g>
  </g>
</svg>
